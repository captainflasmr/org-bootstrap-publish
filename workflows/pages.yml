name: Deploy org-bootstrap-publish site to Pages

# Copy this file to `.github/workflows/pages.yml` in your site's
# repository.  Adjust PATHS under `on.push.paths' to match your
# source tree.

on:
  push:
    branches:
      - main
    paths:
      - 'README.org'
      - 'static/**'
      - 'assets/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site
        uses: actions/checkout@v4

      - name: Checkout org-bootstrap-publish
        uses: actions/checkout@v4
        with:
          repository: captainflasmr/org-bootstrap-publish
          path: .obp
          ref: main

      - name: Install Emacs
        run: |
          sudo apt-get update
          sudo apt-get install -y emacs-nox

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build site
        run: |
          emacs --batch \
            -L "$GITHUB_WORKSPACE/.obp" \
            -l org-bootstrap-publish \
            --eval "(progn
              (setq org-bootstrap-publish-source-file \"$GITHUB_WORKSPACE/README.org\")
              (setq org-bootstrap-publish-output-dir  \"$GITHUB_WORKSPACE/public\")
              (setq org-bootstrap-publish-site-title  \"Emacs Dwelling\")
              (setq org-bootstrap-publish-site-tagline \"Journeying through the Emacs rabbit hole\")
              (setq org-bootstrap-publish-site-url    \"${{ steps.pages.outputs.base_url }}/\")
              (setq org-bootstrap-publish-site-path   \"${{ steps.pages.outputs.base_path }}/\")
              (setq org-bootstrap-publish-author      \"James Dyer\")
              (setq org-bootstrap-publish-menu-tags
                    '((\"2026\"         . \"2026\")
                      (\"org\"          . \"org\")
                      (\"ollama-buddy\" . \"ollama_buddy\")
                      (\"dired\"        . \"dired\")))
              (org-bootstrap-publish))"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
